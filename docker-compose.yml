services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./passwd:/mosquitto/config/passwd
    networks:
      - iot-net

  sensor:
    build: ./sensor
    container_name: sensor
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
    networks:
      - iot-net
    restart: unless-stopped

  server:
    build: ./server
    container_name: server
    ports:
      - "5001:5000"
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
    volumes:
      - server-data:/data
    networks:
      - iot-net
    restart: unless-stopped

networks:
  iot-net:
    driver: bridge

volumes:
  server-data:
